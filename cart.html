<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Review your shopping cart at GameVault. Update quantities, remove items, and proceed to checkout.">
    <meta name="robots" content="noindex, follow">
    <meta name="author" content="GameVault">
    <title>GameVault | Shopping Cart</title>
    <link rel="stylesheet" href="cart-style.css">
</head>
<body>

<header>
    <svg width="200" height="75" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="gvGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#22c55e" />
                <stop offset="100%" stop-color="#4ade80" />
            </linearGradient>
            <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#E0E0E0" />
                <stop offset="100%" stop-color="#9E9E9E" />
            </linearGradient>
        </defs>
        <circle cx="150" cy="150" r="90" fill="url(#gvGradient)" stroke="url(#metal)" stroke-width="8" />
        <circle cx="150" cy="150" r="60" fill="#0f172a" stroke="url(#metal)" stroke-width="4" />
        <path d="M115 155 Q120 135 140 135 L160 135 Q180 135 185 155 Q190 175 170 175 L130 175 Q110 175 115 155 Z" fill="url(#gvGradient)" stroke="url(#metal)" stroke-width="2" />
        <rect x="130" y="148" width="16" height="6" fill="#FFFFFF" />
        <rect x="135" y="143" width="6" height="16" fill="#FFFFFF" />
        <circle cx="165" cy="150" r="5" fill="#FFFFFF" />
        <circle cx="178" cy="158" r="5" fill="#FFFFFF" />
        <text x="280" y="165" font-family="Verdana, Geneva, sans-serif" font-size="64" font-weight="bold" fill="url(#gvGradient)">
            GameVault
        </text>
    </svg>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Store</a>
        <a href="#">Deals</a>
        <a href="#">Contact</a>
        <a href="cart.html" class="cart-link active" style="color: #22c55e;">🛒 Cart (<span id="cart-count">0</span>)</a>
    </nav>
</header>

<section class="cart-container">
    <h2>Shopping Cart</h2>
    
    <div class="cart-content">
        <!-- Cart Items -->
        <div class="cart-items" id="cartItems">
            <p class="empty-message">Your cart is empty</p>
        </div>
        
        <!-- Cart Summary -->
        <div class="cart-summary">
            <h3>Order Summary</h3>
            <div class="summary-line">
                <span>Subtotal:</span>
                <span id="subtotal">₹0</span>
            </div>
            <div class="summary-line">
                <span>Tax (18%):</span>
                <span id="tax">₹0</span>
            </div>
            <div class="summary-line total">
                <span>Total:</span>
                <span id="total">₹0</span>
            </div>
            <button class="proceed-btn" id="proceedBtn">Proceed to Checkout</button>
            <button class="continue-btn" id="continueBtn">Continue Shopping</button>
        </div>
    </div>
</section>

<!-- Checkout Modal -->
<div id="checkoutModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Checkout</h2>
        
        <form id="checkoutForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            
            <div class="form-group">
                <label for="address">Delivery Address</label>
                <textarea id="address" name="address" rows="3" required></textarea>
            </div>
            
            <div class="form-group">
                <label for="payment">Payment Method</label>
                <select id="payment" name="payment" required>
                    <option value="">Select Payment Method</option>
                    <option value="credit_card">Credit Card</option>
                    <option value="debit_card">Debit Card</option>
                    <option value="upi">UPI</option>
                    <option value="net_banking">Net Banking</option>
                    <option value="cod">Cash on Delivery</option>
                </select>
            </div>
            
            <div class="order-total">
                <h3>Order Total: ₹<span id="checkoutTotal">0</span></h3>
            </div>
            
            <button type="submit" class="place-order-btn">Place Order</button>
            <button type="button" class="cancel-btn" id="cancelBtn">Cancel</button>
        </form>
    </div>
</div>

<!-- Success Modal -->
<div id="successModal" class="modal">
    <div class="modal-content success">
        <div class="success-icon">✓</div>
        <h2>Order Placed Successfully!</h2>
        <p id="orderId"></p>
        <p id="orderAmount"></p>
        <button id="backToStoreBtn" class="back-btn">Back to Store</button>
    </div>
</div>

<script src="cart-script.js"></script>

</body>
</html>
