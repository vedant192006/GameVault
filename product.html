<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Structured Data for SEO (JSON-LD) -->

    {

                    "category": "RPG",
                    "offers": {
                        "@type": "Offer",
                        "price": "4999",
                        "priceCurrency": "INR",
                        "availability": "https://schema.org/InStock"
                    }
                }
            },
            {
                "@type": "ListItem",
                "position": 2,
                "item": {
                    "@type": "Product",
                    "name": "God of War",
                    "description": "An epic action-adventure journey featuring Kratos and his son Atreus in the world of Norse mythology.",
                    "image": "https://upload.wikimedia.org/wikipedia/en/a/a7/God_of_War_4_cover.jpg",
                    "category": "Action",
                    "offers": {
                        "@type": "Offer",
                        "price": "3999",
                        "priceCurrency": "INR",
                        "availability": "https://schema.org/InStock"
                    }

            },
            {
                "@type": "ListItem",
                "position": 3,
                "item": {

                    "name": "Red Dead Redemption 2",
                    "description": "An epic open-world western adventure set in America's unforgiving heartland.",
                    "image": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQWmYkh80D5i2Rv7qgmZGQ-Q-I9Wj91nHR_gTIlgknSHMlLpmvQ",
                    "category": "Open World",
                    "offers": {
                        "@type": "Offer",
                        "price": "3079",
                        "priceCurrency": "INR",
                        "availability": "https://schema.org/InStock"
                    }
                }
            }
        ]
    }
    </script>
</head>
<body>

<header>
    <svg width="200" height="75" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="gvGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#22c55e" />
                <stop offset="100%" stop-color="#4ade80" />
            </linearGradient>
            <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#E0E0E0" />
                <stop offset="100%" stop-color="#9E9E9E" />
            </linearGradient>
        </defs>
        <circle cx="150" cy="150" r="90" fill="url(#gvGradient)" stroke="url(#metal)" stroke-width="8" />
        <circle cx="150" cy="150" r="60" fill="#0f172a" stroke="url(#metal)" stroke-width="4" />
        <path d="M115 155 Q120 135 140 135 L160 135 Q180 135 185 155 Q190 175 170 175 L130 175 Q110 175 115 155 Z" fill="url(#gvGradient)" stroke="url(#metal)" stroke-width="2" />
        <rect x="130" y="148" width="16" height="6" fill="#FFFFFF" />
        <rect x="135" y="143" width="6" height="16" fill="#FFFFFF" />
        <circle cx="165" cy="150" r="5" fill="#FFFFFF" />
        <circle cx="178" cy="158" r="5" fill="#FFFFFF" />
        <text x="280" y="165" font-family="Verdana, Geneva, sans-serif" font-size="64" font-weight="bold" fill="url(#gvGradient)">
            GameVault
        </text>
    </svg>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Store</a>
        <a href="product.html" class="active">Deals</a>
        <a href="index.html#contact">Contact</a>
        <a href="cart.html" class="cart-link">🛒 Cart (<span id="cart-count">0</span>)</a>
    </nav>
</header>

<!-- Product Detail Section -->
<section class="prod" id="productDetail">
    <h1>Featured Game Deals</h1>

    <!-- Featured Product Spotlight -->
    <div class="product-spotlight" id="spotlight">
        <!-- Dynamically loaded -->
    </div>

    <!-- All Products with Details -->
    <h2 style="margin-top: 3rem; margin-bottom: 1.5rem;">All Games</h2>
    <div class="grid" id="gameGrid"></div>
</section>

<!-- Footer -->
<footer>
    <div class="footer-bottom">
        <p>&copy; 2026 GameVault. All rights reserved.</p>
    </div>
</footer>

<script src="cart-script.js"></script>
<script src="script.js"></script>
<script>
    // Product detail page: render a spotlight for a featured game
    document.addEventListener('DOMContentLoaded', function() {
        const spotlight = document.getElementById('spotlight');
        if (!spotlight || typeof games === 'undefined') return;

        // Pick Elden Ring as the featured product
        const featured = games.find(g => g.title === "Elden Ring") || games[0];

        spotlight.innerHTML = `
            <article class="spotlight-card" itemscope itemtype="https://schema.org/Product">
                <div class="spotlight-image">
                    <img src="${featured.image}" alt="${featured.title} game cover art" itemprop="image">
                    <span class="spotlight-badge">🔥 Featured Deal</span>
                </div>
                <div class="spotlight-info">
                    <h2 itemprop="name">${featured.title}</h2>
                    <p class="spotlight-category">${featured.category}</p>
                    <p class="spotlight-desc" itemprop="description">
                        Experience one of the highest-rated games of all time. 
                        Immerse yourself in a breathtaking open world with challenging gameplay, 
                        deep lore, and unforgettable moments.
                    </p>
                    <div class="spotlight-price" itemprop="offers" itemscope itemtype="https://schema.org/Offer">
                        <span class="old-price">₹5,999</span>
                        <span class="current-price" itemprop="price" content="${featured.price}">₹${featured.price.toLocaleString('en-IN')}</span>
                        <meta itemprop="priceCurrency" content="INR">
                        <meta itemprop="availability" content="https://schema.org/InStock">
                    </div>
                    <div class="spotlight-actions">
                        <input type="number" id="quantity-spotlight" min="1" max="10" value="1" class="quantity-input">
                        <button class="add-to-cart-btn" onclick="addToCart('${featured.title}', ${featured.price})">
                            🛒 Add to Cart
                        </button>
                    </div>
                </div>
            </article>
        `;
    });
</script>

</body>
</html>
